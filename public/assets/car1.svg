<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg-gradient)"/>
  
  <!-- Car Silhouette -->
  <g transform="translate(100, 200)">
    <!-- Main Body -->
    <path d="M 50 150 L 150 100 L 300 80 L 450 80 L 550 100 L 600 150 L 600 200 L 50 200 Z" 
          fill="url(#car-gradient)" stroke="#1E3A8A" stroke-width="3"/>
    
    <!-- Windshield -->
    <path d="M 200 100 L 250 60 L 400 60 L 450 100 Z" 
          fill="rgba(59, 130, 246, 0.3)" stroke="#3B82F6" stroke-width="2"/>
    
    <!-- Windows -->
    <ellipse cx="180" cy="120" rx="40" ry="30" fill="rgba(59, 130, 246, 0.2)"/>
    <ellipse cx="470" cy="120" rx="40" ry="30" fill="rgba(59, 130, 246, 0.2)"/>
    
    <!-- Wheels -->
    <circle cx="150" cy="200" r="45" fill="#1F2937" stroke="#3B82F6" stroke-width="4"/>
    <circle cx="150" cy="200" r="25" fill="url(#wheel-gradient)"/>
    <circle cx="500" cy="200" r="45" fill="#1F2937" stroke="#3B82F6" stroke-width="4"/>
    <circle cx="500" cy="200" r="25" fill="url(#wheel-gradient)"/>
    
    <!-- Details -->
    <path d="M 520 140 L 580 140 L 590 160 L 520 160 Z" 
          fill="#60A5FA" opacity="0.8"/>
    <circle cx="100" cy="140" r="15" fill="#60A5FA" opacity="0.9"/>
  </g>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="800" y2="600">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#F9FAFB"/>
    </linearGradient>
    
    <linearGradient id="car-gradient" x1="0" y1="0" x2="600" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    
    <radialGradient id="wheel-gradient">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </radialGradient>
  </defs>
  
  <!-- Text -->
  <text x="400" y="500" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
        fill="#1E3A8A" text-anchor="middle">Phantom GT-R</text>
</svg>
