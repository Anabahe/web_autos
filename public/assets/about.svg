<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#factory-bg)"/>
  
  <!-- Factory Building -->
  <rect x="100" y="200" width="1000" height="400" fill="url(#building-gradient)" stroke="#1E3A8A" stroke-width="3"/>
  
  <!-- Windows -->
  <g opacity="0.8">
    <rect x="150" y="250" width="120" height="80" fill="#60A5FA" opacity="0.6"/>
    <rect x="300" y="250" width="120" height="80" fill="#60A5FA" opacity="0.6"/>
    <rect x="450" y="250" width="120" height="80" fill="#60A5FA" opacity="0.6"/>
    <rect x="600" y="250" width="120" height="80" fill="#60A5FA" opacity="0.6"/>
    <rect x="750" y="250" width="120" height="80" fill="#60A5FA" opacity="0.6"/>
    <rect x="900" y="250" width="120" height="80" fill="#60A5FA" opacity="0.6"/>
    
    <rect x="150" y="360" width="120" height="80" fill="#3B82F6" opacity="0.5"/>
    <rect x="300" y="360" width="120" height="80" fill="#3B82F6" opacity="0.5"/>
    <rect x="450" y="360" width="120" height="80" fill="#3B82F6" opacity="0.5"/>
    <rect x="600" y="360" width="120" height="80" fill="#3B82F6" opacity="0.5"/>
    <rect x="750" y="360" width="120" height="80" fill="#3B82F6" opacity="0.5"/>
    <rect x="900" y="360" width="120" height="80" fill="#3B82F6" opacity="0.5"/>
  </g>
  
  <!-- Roof -->
  <polygon points="50,200 600,100 1150,200" fill="url(#roof-gradient)" stroke="#1E3A8A" stroke-width="3"/>
  
  <!-- Logo on Building -->
  <circle cx="600" cy="500" r="80" fill="white" opacity="0.9"/>
  <path d="M 600 440 L 650 460 L 650 540 L 600 560 L 550 540 L 550 460 Z" 
        fill="url(#logo-gradient)" stroke="white" stroke-width="2"/>
  
  <!-- Ground -->
  <rect x="0" y="600" width="1200" height="200" fill="#E0F2FE"/>
  
  <!-- Cars in front -->
  <g transform="translate(200, 520)">
    <ellipse cx="100" cy="80" rx="120" ry="40" fill="url(#car-shadow)" opacity="0.3"/>
    <path d="M 20 60 L 80 30 L 140 25 L 180 30 L 200 60 L 200 80 L 20 80 Z" 
          fill="url(#car1-gradient)" stroke="#1E3A8A" stroke-width="2"/>
    <circle cx="60" cy="80" r="15" fill="#1F2937" stroke="#3B82F6" stroke-width="2"/>
    <circle cx="160" cy="80" r="15" fill="#1F2937" stroke="#3B82F6" stroke-width="2"/>
  </g>
  
  <g transform="translate(500, 530)">
    <ellipse cx="100" cy="70" rx="110" ry="35" fill="url(#car-shadow)" opacity="0.3"/>
    <path d="M 25 55 L 75 28 L 135 23 L 175 28 L 195 55 L 195 75 L 25 75 Z" 
          fill="url(#car2-gradient)" stroke="#1E3A8A" stroke-width="2"/>
    <circle cx="60" cy="75" r="14" fill="#1F2937" stroke="#60A5FA" stroke-width="2"/>
    <circle cx="160" cy="75" r="14" fill="#1F2937" stroke="#60A5FA" stroke-width="2"/>
  </g>
  
  <g transform="translate(800, 525)">
    <ellipse cx="95" cy="75" rx="115" ry="38" fill="url(#car-shadow)" opacity="0.3"/>
    <path d="M 22 58 L 78 32 L 138 27 L 178 32 L 198 58 L 198 78 L 22 78 Z" 
          fill="url(#car3-gradient)" stroke="#1E3A8A" stroke-width="2"/>
    <circle cx="58" cy="78" r="15" fill="#1F2937" stroke="#3B82F6" stroke-width="2"/>
    <circle cx="162" cy="78" r="15" fill="#1F2937" stroke="#3B82F6" stroke-width="2"/>
  </g>
  
  <!-- Text -->
  <text x="600" y="720" font-family="Arial, sans-serif" font-size="48" font-weight="bold" 
        fill="#1E3A8A" text-anchor="middle">NovaDrive Factory</text>
  <text x="600" y="760" font-family="Arial, sans-serif" font-size="24" 
        fill="#3B82F6" text-anchor="middle">Innovation • Excellence • Performance</text>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="factory-bg" x1="0" y1="0" x2="0" y2="800">
      <stop offset="0%" stop-color="#DBEAFE"/>
      <stop offset="50%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#F0F9FF"/>
    </linearGradient>
    
    <linearGradient id="building-gradient" x1="100" y1="200" x2="100" y2="600">
      <stop offset="0%" stop-color="#F3F4F6"/>
      <stop offset="100%" stop-color="#E5E7EB"/>
    </linearGradient>
    
    <linearGradient id="roof-gradient" x1="600" y1="100" x2="600" y2="200">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    
    <linearGradient id="logo-gradient" x1="550" y1="440" x2="650" y2="560">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    
    <radialGradient id="car-shadow">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    
    <linearGradient id="car1-gradient">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    
    <linearGradient id="car2-gradient">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    
    <linearGradient id="car3-gradient">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>
  </defs>
</svg>
